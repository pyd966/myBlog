<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myBlog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="myBlog home">
        <span class="brand-mark">m</span>
        <span>myBlog</span>
      </a>
      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="搜索文章、标签、正文" />
      </label>
      <nav class="top-actions">
        <button class="ghost hidden" id="newPostButton" type="button">写文章</button>
        <button class="ghost hidden" id="profileButton" type="button">资料</button>
        <button class="ghost" id="loginButton" type="button">登录</button>
        <div class="user-pill hidden" id="userPill"></div>
      </nav>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h2>文章</h2>
          <div id="postList" class="post-list"></div>
        </div>
        <div class="sidebar-section">
          <h2>标签</h2>
          <div id="tagList" class="tag-list"></div>
        </div>
      </aside>

      <section class="content-shell">
        <article id="reader" class="reader empty">
          <p class="eyebrow">myBlog</p>
          <h1>从 0 到 1 的博客笔记</h1>
          <p>
            这里会展示文章、评论、点赞、全文搜索、GitHub 登录、划线评论和 owner 专用摘要标签生成。
          </p>
          <p>注册第一个账号后，它会自动成为 owner，并获得文章发布与管理入口。</p>
        </article>
      </section>

      <aside class="rightbar">
        <section class="panel">
          <h2>评论</h2>
          <div id="commentList" class="comment-list muted">选择一篇文章后查看评论。</div>
          <form id="commentForm" class="stack hidden">
            <textarea id="commentContent" rows="3" placeholder="写一条评论"></textarea>
            <button type="submit">发布评论</button>
          </form>
        </section>
        <section class="panel">
          <h2>划线评论</h2>
          <p class="muted compact">阅读文章时选中文本，可以为这一段添加评论。</p>
          <div id="highlightList" class="highlight-list"></div>
        </section>
      </aside>
    </main>

    <dialog id="authDialog" class="dialog">
      <form method="dialog" class="dialog-card" id="authForm">
        <button class="icon-close" type="button" data-dialog-close aria-label="关闭">×</button>
        <h2>登录或注册</h2>
        <div class="tabs">
          <button class="tab active" data-auth-mode="login" type="button">登录</button>
          <button class="tab" data-auth-mode="register" type="button">注册</button>
        </div>
        <label>
          <span id="accountLabel">邮箱或用户名</span>
          <input id="authAccount" required />
        </label>
        <label class="register-only hidden">
          <span>用户名</span>
          <input id="authUsername" />
        </label>
        <label>
          <span>密码</span>
          <input id="authPassword" type="password" minlength="6" required />
        </label>
        <button type="submit" id="authSubmit">登录</button>
        <a class="github-login" href="/api/auth/github">使用 GitHub 登录</a>
        <p class="form-note" id="authMessage"></p>
      </form>
    </dialog>

    <dialog id="postDialog" class="dialog wide">
      <form method="dialog" class="dialog-card" id="postForm">
        <button class="icon-close" type="button" data-dialog-close aria-label="关闭">×</button>
        <h2 id="postDialogTitle">发布文章</h2>
        <label>
          <span>标题</span>
          <input id="postTitle" required placeholder="给文章起一个清楚的标题" />
        </label>
        <label>
          <span>正文 Markdown</span>
          <textarea id="postContent" rows="12" required placeholder="支持 Markdown 语法"></textarea>
        </label>
        <div class="assist-row">
          <label>
            <span>摘要</span>
            <textarea id="postSummary" rows="3" placeholder="可手写，也可用辅助生成"></textarea>
          </label>
          <label>
            <span>标签</span>
            <input id="postTags" placeholder="例如：AI, 后端, 训练营" />
          </label>
        </div>
        <div class="form-actions">
          <button class="ghost hidden" id="aiAssistButton" type="button">辅助生成摘要与标签</button>
          <button type="submit" id="postSubmitButton">发布</button>
        </div>
        <p class="form-note" id="postMessage"></p>
      </form>
    </dialog>

    <dialog id="profileDialog" class="dialog">
      <form method="dialog" class="dialog-card" id="profileForm">
        <button class="icon-close" type="button" data-dialog-close aria-label="关闭">×</button>
        <h2>个人资料</h2>
        <label>
          <span>用户名</span>
          <input id="profileUsername" required />
        </label>
        <label>
          <span>邮箱</span>
          <input id="profileEmail" type="email" required />
        </label>
        <label>
          <span>头像 URL</span>
          <input id="profileAvatar" placeholder="https://..." />
        </label>
        <button type="submit">保存资料</button>
        <p class="form-note" id="profileMessage"></p>
      </form>
    </dialog>

    <div id="selectionMenu" class="selection-menu hidden">
      <button id="openHighlightComposer" type="button">评论</button>
    </div>

    <form id="highlightComposer" class="highlight-composer hidden">
      <div class="composer-quote" id="selectedQuote"></div>
      <textarea id="highlightContent" rows="3" required placeholder="写一句划线评论"></textarea>
      <div class="composer-actions">
        <button class="ghost" id="cancelHighlight" type="button">取消</button>
        <button type="submit">保存</button>
      </div>
    </form>

    <div id="toast" class="toast hidden"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
